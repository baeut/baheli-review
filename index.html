<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>八合里 · 好评助手</title>
<style>
  :root {
    --red: #D44A3A;
    --bg: #FAFAF8;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --text-secondary: #8E8E8E;
    --border: #EBEBE5;
    --selected: #FDF0EE;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased;
    padding-bottom: calc(76px + env(safe-area-inset-bottom, 20px));
  }
  .container { max-width: 420px; margin: 0 auto; padding: 16px 14px; }

  .header { text-align: center; padding: 8px 0 4px; }
  .header .brand { font-size: 20px; font-weight: 700; letter-spacing: 0.3px; }
  .header .brand span { color: var(--red); }
  .header .subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  .review-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px; margin: 10px 0 14px; min-height: 100px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03); position: relative;
  }
  .review-card .label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .review-card .review-text { font-size: 14px; line-height: 1.7; color: var(--text-secondary); white-space: pre-wrap; word-break: break-word; min-height: 48px; }
  .review-card .review-text.done { color: var(--text); }
  .review-card .backup-row { display: flex; gap: 8px; margin-top: 10px; }
  .backup-row .sm-btn {
    flex: 1; padding: 8px 0; border-radius: 8px; border: 1px solid var(--border);
    background: var(--card); font-size: 12px; cursor: pointer; text-align: center;
    transition: all 0.15s; color: var(--text-secondary);
  }
  .backup-row .sm-btn:active { background: #F5F5F0; }
  .backup-row .sm-btn.primary { border-color: var(--red); color: var(--red); font-weight: 500; }

  .loading-pulse { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .category-tabs {
    display: flex; gap: 6px; overflow-x: auto; padding: 2px 0 8px;
    scrollbar-width: none; -ms-overflow-style: none; -webkit-overflow-scrolling: touch;
  }
  .category-tabs::-webkit-scrollbar { display: none; }
  .cat-tab {
    flex-shrink: 0; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
    background: var(--card); border: 1px solid var(--border); cursor: pointer;
    transition: all 0.15s; user-select: none; white-space: nowrap;
    display: flex; align-items: center; gap: 4px;
  }
  .cat-tab .emoji { font-size: 15px; }
  .cat-tab .badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; height: 18px; border-radius: 9px;
    background: #EEE; font-size: 10px; font-weight: 600; color: var(--text-secondary);
    padding: 0 5px; transition: all 0.15s;
  }
  .cat-tab.active { background: var(--text); color: #FFF; border-color: var(--text); }
  .cat-tab.active .badge { background: rgba(255,255,255,0.25); color: #FFF; }

  .dish-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 12px; }
  .dish-item {
    padding: 11px 6px; border-radius: 10px; border: 1.5px solid var(--border);
    background: var(--card); font-size: 13px; text-align: center; cursor: pointer;
    transition: all 0.12s; user-select: none; position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 50px; gap: 3px;
  }
  .dish-item:active { transform: scale(0.96); }
  .dish-item .name { font-weight: 500; color: var(--text); line-height: 1.3; }
  .dish-item .cook { font-size: 10px; color: var(--text-secondary); }
  .dish-item .tag-dot {
    position: absolute; top: 5px; right: 5px; width: 6px; height: 6px;
    border-radius: 50%; background: var(--red);
  }
  .dish-item.selected {
    border-color: var(--red); background: var(--selected);
    box-shadow: 0 0 0 1px var(--red) inset;
  }
  .dish-item.selected .name { color: var(--red); font-weight: 600; }
  .dish-item.selected::after {
    content: '✓'; position: absolute; top: 4px; right: 6px;
    font-size: 11px; color: var(--red); font-weight: 700;
  }

  .platform-section { margin-top: 12px; }
  .platform-section .section-title { font-size: 11px; color: var(--text-secondary); text-align: center; margin-bottom: 8px; letter-spacing: 1px; }
  .platforms { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .platform-btn {
    display: flex; align-items: center; justify-content: center; gap: 4px;
    padding: 12px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--card); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; text-decoration: none; color: var(--text);
  }
  .platform-btn:active { background: #F8F8F5; }
  .platform-btn .icon { font-size: 18px; }

  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: var(--card); border-top: 1px solid var(--border);
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px));
    display: flex; align-items: center; gap: 10px;
  }
  .bottom-bar .selected-count {
    font-size: 13px; color: var(--text-secondary); white-space: nowrap; min-width: 70px;
  }
  .bottom-bar .selected-count span { color: var(--text); font-weight: 600; }
  .btn-generate {
    flex: 1; padding: 14px 0; border-radius: 12px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; border: none; letter-spacing: 0.3px;
    background: var(--red); color: #FFF; text-align: center;
  }
  .btn-generate:active { transform: scale(0.97); }
  .btn-generate:disabled { background: #D5D5CF; color: #999; cursor: not-allowed; }
  .btn-generate.loading { background: #C44A3A; pointer-events: none; }

  .toast {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) translateY(10px);
    background: rgba(0,0,0,0.82); color: #FFF; padding: 10px 22px; border-radius: 8px;
    font-size: 14px; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translate(-50%, -50%) translateY(0); }

  .footer { text-align: center; padding: 10px 0 4px; font-size: 10px; color: #CCC; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="brand">八合里<span>·</span>好评助手</div>
    <div class="subtitle">科技园店 · 科技南八路51号</div>
  </div>

  <div class="review-card">
    <div class="label">AI 好评文案</div>
    <div class="review-text" id="reviewText">选几道你吃过的菜，我来帮你写好评 ✨</div>
    <div class="backup-row" id="backupRow" style="display:none;">
      <button class="sm-btn" id="manualCopyBtn">复制文案</button>
      <button class="sm-btn primary" id="manualJumpBtn">去大众点评发布</button>
    </div>
  </div>

  <div class="category-tabs" id="categoryTabs"></div>
  <div class="dish-grid" id="dishGrid"></div>

  <div class="platform-section" id="platformSection" style="display:none;">
    <div class="section-title">更多平台</div>
    <div class="platforms">
      <a class="platform-btn" id="btnDianping"><span class="icon">⭐</span> 大众点评</a>
      <a class="platform-btn" id="btnMeituan"><span class="icon">🛵</span> 美团</a>
    </div>
  </div>

  <div class="footer">八合里潮汕牛肉火锅（科技园店）</div>
</div>

<div class="bottom-bar">
  <div class="selected-count">已选 <span id="countNum">0</span> 道菜</div>
  <button class="btn-generate" id="generateBtn" disabled>🌟 生成好评文案</button>
</div>

<div class="toast" id="toast"></div>

<script>
const CONFIG = {
  shopName: '八合里潮汕牛肉火锅（科技园店）',
  shopAddress: '科技南八路51号高新花园北区3栋NL112-115',
  dianpingShopId: 'l2JDzC1sz06sfROw',
  dianpingWebUrl: 'https://m.dianping.com/shopinfo/l2JDzC1sz06sfROw',
  meituanShopId: '6_bYz0l5qeDKIjFnqTN-PgI',
  meituanWebUrl: 'https://h5.waimai.meituan.com/waimai/mindex/menu?poi_id_str=6_bYz0l5qeDKIjFnqTN-PgI',
  apiBase: 'https://api.proma.cool/api/v1',
  apiKey: 'pk_lDq7ROXSepqEWZ178R9lCX8W6CA9AumaWFc9tB0LpEi',
  model: 'deepseek/deepseek-chat',
};

const MENU_FALLBACK = {
  categories: [
    { name:'锅底', emoji:'🍲' }, { name:'嫩瘦系', emoji:'🥩' }, { name:'肥嫩系', emoji:'🍖' },
    { name:'内脏系', emoji:'🐂' }, { name:'手打丸', emoji:'🧆' }, { name:'主食', emoji:'🍚' }
  ],
  dishes: [
    { name:'清汤', category:'锅底', cook:'即食', tags:[] },
    { name:'牛腩汤底', category:'锅底', cook:'即食', tags:[] },
    { name:'沙参玉竹汤底', category:'锅底', cook:'即食', tags:[] },
    { name:'嫩肉', category:'嫩瘦系', cook:'涮8秒', tags:[] },
    { name:'牛朴肉（脖仁）', category:'嫩瘦系', cook:'涮8秒', tags:['新人推荐'] },
    { name:'三花趾', category:'嫩瘦系', cook:'涮10秒', tags:['必点'] },
    { name:'五花趾', category:'嫩瘦系', cook:'涮10秒', tags:['必点'] },
    { name:'牛舌', category:'嫩瘦系', cook:'涮8秒', tags:[] },
    { name:'肥牛', category:'肥嫩系', cook:'涮8秒', tags:[] },
    { name:'吊龙伴', category:'肥嫩系', cook:'涮8秒', tags:['必点'] },
    { name:'双层肉', category:'肥嫩系', cook:'涮8秒', tags:[] },
    { name:'匙仁', category:'肥嫩系', cook:'涮8秒', tags:[] },
    { name:'匙柄', category:'肥嫩系', cook:'涮8秒', tags:['必点'] },
    { name:'胸口朥', category:'肥嫩系', cook:'涮1-2分钟', tags:['必点'] },
    { name:'牛百叶', category:'内脏系', cook:'涮8秒', tags:[] },
    { name:'手撕牛百叶', category:'内脏系', cook:'涮10秒', tags:[] },
    { name:'牛肚', category:'内脏系', cook:'涮8秒', tags:[] },
    { name:'牛腩', category:'内脏系', cook:'煮10分钟', tags:[] },
    { name:'牛筋', category:'内脏系', cook:'煮10分钟', tags:[] },
    { name:'生板筋', category:'内脏系', cook:'煮10分钟', tags:[] },
    { name:'牛尾', category:'内脏系', cook:'煮10分钟', tags:[] },
    { name:'手锤牛肉丸（生）', category:'手打丸', cook:'煮4分钟', tags:['必点'] },
    { name:'手锤牛肉丸（熟）', category:'手打丸', cook:'即食', tags:['必点'] },
    { name:'手锤牛筋丸（生）', category:'手打丸', cook:'煮4分钟', tags:[] },
    { name:'手锤牛筋丸（熟）', category:'手打丸', cook:'即食', tags:[] },
    { name:'湿炒牛河', category:'主食', cook:'即食', tags:['新人推荐'] }
  ]
};

const state = {
  menu: null,
  selected: new Set(),
  activeCatIdx: 0,
  phase: 'idle',
  generatedText: '',
  jumpTimer: null,
  loadingDots: 0,
  loadingInterval: null,
};

const $reviewText = document.getElementById('reviewText');
const $backupRow = document.getElementById('backupRow');
const $categoryTabs = document.getElementById('categoryTabs');
const $dishGrid = document.getElementById('dishGrid');
const $platformSection = document.getElementById('platformSection');
const $generateBtn = document.getElementById('generateBtn');
const $countNum = document.getElementById('countNum');
const $toast = document.getElementById('toast');

// ====== LOAD MENU with 1s timeout ======
async function loadMenu() {
  try {
    const ctrl = new AbortController();
    const timeout = setTimeout(() => ctrl.abort(), 1000);
    const resp = await fetch('menu-baheli.json', { signal: ctrl.signal });
    clearTimeout(timeout);
    if (resp.ok) { state.menu = await resp.json(); return; }
  } catch(e) { /* fallback */ }
  state.menu = MENU_FALLBACK;
}

function getCategories() { return state.menu.categories; }
function getDishesByCat(idx) {
  const cat = getCategories()[idx];
  return state.menu.dishes.filter(d => d.category === cat.name);
}

function renderCategoryTabs() {
  const cats = getCategories();
  $categoryTabs.innerHTML = cats.map((c, i) => {
    const count = state.menu.dishes.filter(d => d.category === c.name && state.selected.has(d.name)).length;
    return `<div class="cat-tab${i === state.activeCatIdx ? ' active' : ''}" data-idx="${i}">
      <span class="emoji">${c.emoji}</span>${c.name}
      ${count > 0 ? `<span class="badge">${count}</span>` : ''}
    </div>`;
  }).join('');
}

function renderDishGrid() {
  const dishes = getDishesByCat(state.activeCatIdx);
  $dishGrid.innerHTML = dishes.map(d => {
    const sel = state.selected.has(d.name);
    return `<div class="dish-item${sel ? ' selected' : ''}" data-name="${d.name}">
      ${d.tags.includes('必点') && !sel ? '<div class="tag-dot"></div>' : ''}
      <span class="name">${d.name}</span>
      ${d.cook ? `<span class="cook">${d.cook}</span>` : ''}
    </div>`;
  }).join('');
}

function updateBottomBar() {
  const n = state.selected.size;
  $countNum.textContent = n;
  $generateBtn.disabled = (n === 0 || state.phase === 'generating');
  if (state.phase === 'generating') {
    $generateBtn.classList.add('loading');
  } else if (state.phase === 'done') {
    $generateBtn.textContent = '🔄 重新生成';
    $generateBtn.classList.remove('loading');
    $generateBtn.disabled = false;
  } else {
    $generateBtn.textContent = '🌟 生成好评文案';
    $generateBtn.classList.remove('loading');
  }
}

function refreshAll() {
  renderCategoryTabs();
  renderDishGrid();
  updateBottomBar();
}

$categoryTabs.addEventListener('click', e => {
  const tab = e.target.closest('.cat-tab');
  if (!tab) return;
  state.activeCatIdx = parseInt(tab.dataset.idx);
  refreshAll();
});

$dishGrid.addEventListener('click', e => {
  const item = e.target.closest('.dish-item');
  if (!item || state.phase === 'generating') return;
  const name = item.dataset.name;
  if (state.selected.has(name)) { state.selected.delete(name); }
  else { state.selected.add(name); }
  refreshAll();
});

// ====== LOADING ANIMATION ======
function startLoading() {
  state.loadingDots = 0;
  state.loadingInterval = setInterval(() => {
    state.loadingDots = (state.loadingDots + 1) % 4;
    $generateBtn.textContent = '⏳ 生成中' + '.'.repeat(state.loadingDots);
  }, 400);
}
function stopLoading() {
  clearInterval(state.loadingInterval);
  state.loadingInterval = null;
}

// ====== GENERATE ======
$generateBtn.addEventListener('click', () => {
  if (state.selected.size === 0 || state.phase === 'generating') return;
  handleGenerate();
});

async function handleGenerate() {
  if (state.phase === 'generating') return;
  state.phase = 'generating';
  state.generatedText = '';
  $reviewText.textContent = '正在为你撰写...';
  $reviewText.classList.add('loading-pulse');
  $reviewText.classList.remove('done');
  $backupRow.style.display = 'none';
  $platformSection.style.display = 'none';
  startLoading();
  refreshAll();

  const prompt = buildPrompt();
  try {
    const text = await callLLM(prompt);
    state.generatedText = text;
    state.phase = 'done';
    stopLoading();
    $reviewText.textContent = text;
    $reviewText.classList.remove('loading-pulse');
    $reviewText.classList.add('done');
    $backupRow.style.display = 'flex';
    $platformSection.style.display = 'block';
    refreshAll();

    await autoCopy(text);
    showToast('已复制到剪贴板，2秒后跳转大众点评 ✨');

    state.jumpTimer = setTimeout(() => {
      tryJump(`dianping://shopdetail?shopid=${CONFIG.dianpingShopId}`, CONFIG.dianpingWebUrl);
    }, 2000);
  } catch (e) {
    console.error(e);
    state.phase = 'idle';
    stopLoading();
    $reviewText.textContent = '生成失败，请重试 😢';
    $reviewText.classList.remove('loading-pulse');
    $reviewText.classList.remove('done');
    refreshAll();
    showToast('网络不稳定，请重试');
  }
}

function buildPrompt() {
  const dishes = Array.from(state.selected);
  const dishList = dishes.slice(0, 8).map((d, i) => `${i + 1}. ${d}`).join('\n');
  const more = dishes.length > 8 ? '等' : '';
  return `你是八合里潮汕牛肉火锅（科技园店）的真实顾客。请用第一人称写一条大众点评好评。你点了：\n${dishList}${more}\n挑2-3道展开描述口感。80-120字，1-2个emoji。直接写正文。`;
}

async function callLLM(prompt) {
  const resp = await fetch(`${CONFIG.apiBase}/chat/completions`, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${CONFIG.apiKey}` },
    body: JSON.stringify({
      model: CONFIG.model,
      messages: [
        { role:'system', content:'你是八合里的真实顾客，刚吃完潮汕牛肉火锅。用第一人称写评价，真诚自然。' },
        { role:'user', content: prompt }
      ],
      max_tokens: 200, temperature: 0.85,
    }),
  });
  if (!resp.ok) throw new Error(`API ${resp.status}`);
  const data = await resp.json();
  return data.choices[0].message.content.trim();
}

async function autoCopy(text) {
  try {
    await navigator.clipboard.writeText(text);
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  }
}

document.getElementById('manualCopyBtn').addEventListener('click', async () => {
  if (!state.generatedText) return;
  await autoCopy(state.generatedText);
  showToast('已复制 ✨');
});
document.getElementById('manualJumpBtn').addEventListener('click', () => {
  if (state.jumpTimer) { clearTimeout(state.jumpTimer); state.jumpTimer = null; }
  tryJump(`dianping://shopdetail?shopid=${CONFIG.dianpingShopId}`, CONFIG.dianpingWebUrl);
});

document.getElementById('btnDianping').addEventListener('click', e => {
  e.preventDefault();
  tryJump(`dianping://shopdetail?shopid=${CONFIG.dianpingShopId}`, CONFIG.dianpingWebUrl);
});
document.getElementById('btnMeituan').addEventListener('click', e => {
  e.preventDefault();
  if (CONFIG.meituanShopId) {
    tryJump(`imeituan://www.meituan.com/poi/${CONFIG.meituanShopId}`, CONFIG.meituanWebUrl);
  } else { showToast('美团店铺 ID 待配置'); }
});

function tryJump(scheme, fallbackUrl) {
  const start = Date.now();
  window.location.href = scheme;
  setTimeout(() => {
    if (Date.now() - start < 2500) { window.location.href = fallbackUrl; }
  }, 2000);
}
function showToast(msg) {
  $toast.textContent = msg; $toast.classList.add('show');
  clearTimeout($toast._timeout);
  $toast._timeout = setTimeout(() => $toast.classList.remove('show'), 2000);
}

(async () => { await loadMenu(); refreshAll(); })();
</script>
</body>
</html>
